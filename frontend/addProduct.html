<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة منتج جديد</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f9;
  direction:rtl;
}

/* ========== الهيدر (نفس الداشبورد) ========== */
.navbar {
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 30px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.right-side{
  display:flex;
  align-items:center;
  gap:10px;
}

.store-img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid #ddd;
}

#welcomeText{
  font-weight:bold;
  color:#333;
}

.left-side{
  display:flex;
  align-items:center;
  gap:15px;
}

.notifications{
  text-decoration:none;
  font-weight:bold;
  font-size:20px;
  cursor:pointer;
}

/* ===== عدّاد الإشعارات ===== */
.notification-wrapper{
  position: relative;
  display: inline-block;
}

.badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.logout{
  text-decoration:none;
  color:#ff3366;
  font-weight:bold;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#ff3366;
}

/* ========== تخطيط الصفحة ========== */
.layout{
  display:flex;
}

/* ========== القائمة الجانبية ========== */
.sidebar{
  width:230px;
  background:#cbced2;
  min-height:100vh;
  padding-top:20px;
}

.sidebar a{
  display:block;
  color:rgb(14, 12, 12);
  text-decoration:none;
  padding:12px 20px;
  margin:5px 10px;
  border-radius:8px;
}

.sidebar a:hover{
  background:#adadab;
}

.sidebar a.active{
  background:#adadab;
  font-weight:bold;
}

/* ========== المحتوى الرئيسي ========== */
.main{
  flex:1;
  padding:25px;
}

/* ===== الفورم (محسّن + متناسق) ===== */
.form-box {
  max-width: 650px;
  margin: 0 auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-box h2{
  text-align:center;
}

input, textarea, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background:#007bff;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#0056b3;
}

#preview {
  max-width: 100%;
  max-height: 220px;
  margin-top: 10px;
  border-radius: 8px;
  display:none;
}

/* ===== الفوتر ===== */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}

footer a {
  color: #ffd000;
  text-decoration: none;
  margin: 0 10px;
}
</style>
</head>

<body>

<!-- ========== HEADER ========== -->
<div class="navbar">

  <div class="right-side">
    <img id="storeImg"
         src="https://via.placeholder.com/45"
         class="store-img">
    <span id="welcomeText">مرحبًا، التاجر</span>
  </div>

  <div class="left-side">
    <div class="notification-wrapper">
      <a class="notifications" href="notifications.html">🔔</a>
      <span id="notifBadge" class="badge" style="display:none;">0</span>
    </div>

    <a class="logout" href="login.html"> تسجيل الخروج</a>
    <div class="logo">Baro</div>
  </div>

</div>

<!-- ========== تخطيط الصفحة ========== -->
<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <a href="dashboard.html">🏠 لوحة التحكم</a>
    <a href="allorders.html">🛒 الطلبات</a>
    <a href="settings.html">⚙️ الإعدادات</a>
    <a href="addProduct.html" class="active">➕ إضافة منتج</a>
  </div>

  <!-- ===== المحتوى الرئيسي ===== -->
  <div class="main">

    <div class="form-box">
      <h2>➕ إضافة منتج جديد</h2>

      <form id="addProductForm" enctype="multipart/form-data">

        <!-- نضعه مخفي ويُملأ تلقائيًا -->
        <input type="hidden" name="merchantId" id="merchantIdField">

        <input type="text" name="name" placeholder="اسم المنتج" required />
        <input type="text" name="category" placeholder="الفئة" required />
        <input type="number" name="price" placeholder="السعر (دج)" required />
        <textarea name="description" placeholder="وصف المنتج"></textarea>

        <label>صورة المنتج:</label>
        <input type="file" name="image" accept="image/*" id="imageInput" />
        <img id="preview" alt="معاينة الصورة" />
<h3>✨ ميزات المنتج (اختياري)</h3>

<div id="featuresBox"></div>

<button type="button" onclick="addFeatureField()">
  ➕ إضافة ميزة جديدة
</button>

<br><br>

        <button type="submit">إضافة المنتج</button>
      </form>
    </div>

  </div>
</div>

<script>
const merchantId = localStorage.getItem("merchantId");
const token = localStorage.getItem("token");

if (!merchantId || !token) {
  alert("الرجاء تسجيل الدخول أولاً");
  window.location = "login.html";
}
document.getElementById("merchantIdField").value = merchantId;

// ===== جلب بيانات التاجر (مثل الداشبورد) =====
fetch(`https://order-platform-2.onrender.com/merchants/${merchantId}`
, {
  headers: {
     "Authorization": `Bearer ${token}` 
    ,  "Content-Type": "application/json"}
}
)
.then(res => res.json())
.then(merchant => {
  document.getElementById("welcomeText").textContent =
    "مرحبًا، " + (merchant.name || "التاجر");

  if(merchant.storeImage){
    document.getElementById("storeImg").src =
      "https://order-platform-2.onrender.com" + merchant.storeImage;
  }
});

// ===== عدّاد الإشعارات =====
fetch(`https://order-platform-2.onrender.com/merchants/${merchantId}/notifications`)
.then(res => res.json())
.then(notifs => {
  const unread = notifs.filter(n => !n.isRead).length;
  const badge = document.getElementById("notifBadge");

  if(unread > 0){
    badge.style.display = "flex";
    badge.textContent = unread;
  } else {
    badge.style.display = "none";
  }
});

// ===== معاينة الصورة =====
const form = document.getElementById("addProductForm");
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  } else {
    preview.style.display = "none";
  }
});

// ===== إرسال المنتج =====
form.addEventListener("submit", async (e) => {
  e.preventDefault();
// نجمع بيانات الفورم باستخدام FormData
  const formData = new FormData(form);
// نضيف الـ token في الهيدر
  formData.append("Authorization", `Bearer ${token}`);
  const formData = new FormData();

formData.append("name", name);
formData.append("price", price);
formData.append("image", imageFile);

fetch(API_URL + "/products", {
  method: "POST",
  body: formData
});
  // جمع الميزات
  const features = collectFeatures();

  // إضافتها كـ JSON داخل الفورم
  formData.append("features", JSON.stringify(features));

  try {
    const response = await fetch("https://order-platform-2.onrender.com/products", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if (data.success) {
      alert("تم إضافة المنتج بنجاح!");
      window.location = "dashboard.html";
    } else {
      alert("حدث خطأ أثناء الإضافة");
    }
  } catch (err) {
    console.error(err);
    alert("حدث خطأ في الاتصال بالسيرفر");
  }
});
// ===== إضافة حقول الميزات والقيم بشكل ديناميكي =====
let featureIndex = 0;

function addFeatureField(){
  const box = document.getElementById("featuresBox");

  const div = document.createElement("div");
  div.style.border = "1px solid #ddd";
  div.style.padding = "10px";
  div.style.marginBottom = "10px";
  div.style.borderRadius = "8px";

  div.innerHTML = `
    <input type="text" placeholder="اسم الميزة (مثال: اللون)" id="featureName_${featureIndex}">

    <div id="valuesBox_${featureIndex}"></div>

    <button type="button" onclick="addValueField(${featureIndex})">
      ➕ إضافة قيمة
    </button>

    <button type="button" onclick="this.parentElement.remove()"
      style="background:red;color:white;margin-right:10px;">
      ❌ حذف الميزة
    </button>
  `;

  box.appendChild(div);

  // إضافة أول قيمة تلقائيًا
  addValueField(featureIndex);

  featureIndex++;
}

function addValueField(index){
  const valuesBox = document.getElementById(`valuesBox_${index}`);

  const input = document.createElement("input");
  input.placeholder = "قيمة الميزة (مثال: أحمر)";
  input.className = "featureValue";
  input.style.display = "block";
  input.style.marginTop = "5px";

  valuesBox.appendChild(input);
}
function collectFeatures(){
  const features = [];

  document.querySelectorAll("#featuresBox > div").forEach(featureDiv => {
    const featureName = featureDiv.querySelector("input[type='text']").value;

    const values = [];
    featureDiv.querySelectorAll(".featureValue").forEach(inp => {
      if(inp.value.trim() !== "") values.push(inp.value);
    });

    if(featureName && values.length > 0){
      features.push({
        name: featureName,
        values: values
      });
    }
  });

  return features;
}

</script>

<footer>
  <p>
    <a href="#">من نحن</a> |
    <a href="#">اتصل بنا</a>
  </p>
  <p>© 2026 Baro - جميع الحقوق محفوظة</p>
</footer>

</body>
</html>
