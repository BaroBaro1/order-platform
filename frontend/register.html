<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب تاجر</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f9;
  direction:rtl;
}
/* ===== الهيدر (مطابق لـ index.html) ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 15px 40px;
  box-shadow: 0 2px 10px rgba(0,0,0,.1);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #ff3366;
}
nav {
  display: flex;          /* ← هذا هو المفتاح */
  align-items: center;
}
nav a {
  margin: 0 10px;
  text-decoration: none;
  color: #333;
  font-weight: 600;
}

nav a:hover {
  color: #ff3366;
}
/* ===== نافذة التسجيل ===== */
.container{
  width:380px;
  margin:60px auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
   border:1px solid #ddd;
  border-radius:8px;
}
button{
  width:100%;
  padding:10px;
  background:#ff3366;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
a{
  display:block;
  margin-top:10px;
}
#msg{color:red;}
/* ===== الفوتر (مطابق لـ index.html) ===== */
footer{
  background:#222;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}

footer a{
  color:#ffd000;
  text-decoration:none;
  margin: 0 10px;
}footer a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>
  
<!-- ========== HEADER (موحّد) ========== -->
<header>
  <div class="logo">Baro</div>

  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="register.html">إنشاء حساب</a>
    <a href="login.html">تسجيل الدخول</a>
    <a href="faq.html">الأسئلة الشائعة</a>
  </nav>
</header>

<div class="container">
  <h2>🆕 إنشاء حساب تاجر</h2>

  <input id="name" placeholder="اسم التاجر">
  <input id="email" type="email" placeholder="البريد الإلكتروني">
  <input id="phone" placeholder="رقم الهاتف">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="register()">إنشاء الحساب</button>

  <p id="msg"></p>

  <a href="login.html">لديك حساب؟ تسجيل الدخول</a>
</div>

<!-- ========== FOOTER (موحّد) ========== -->
<footer>
  <p>
    <a href="#">À propos</a> |
    <a href="#">Contact</a>
  </p>
  <p>© 2026 Baro - جميع الحقوق محفوظة</p>
</footer>

<script>
function register(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;

  fetch("https://order-platform-2.onrender.com/merchant/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name, email, phone, password})
  })
  .then(res => res.json())
  .then(data => {
    if(data.error){
      document.getElementById("msg").textContent = data.error;
    } else {
      alert("تم إنشاء الحساب بنجاح ✅");
      window.location = "login.html";
    }
  })
  .catch(err => console.error(err));
}
</script>
</body>
</html>
