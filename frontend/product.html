<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض المنتج</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f9;
  direction:rtl;
}

/* ========== الهيدر (نفسه) ========== */
.navbar {
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 30px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.right-side{
  display:flex;
  align-items:center;
  gap:10px;
}

.store-img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid #ddd;
}
#welcomeText{
  font-weight:bold;
  color:#333;
}
.left-side{
  display:flex;
  align-items:center;
  gap:15px;
}

.notifications{
  text-decoration:none;
  font-weight:bold;
  font-size:20px;
  cursor:pointer;
}

/* ===== عدّاد الإشعارات ===== */
.notification-wrapper{
  position: relative;
  display: inline-block;
}

.badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.logout{
  text-decoration:none;
  color:#ff3366;
  font-weight:bold;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#ff3366;
}

/* ========== تخطيط الصفحة ========== */
.layout{
  display:flex;
}

/* ========== القائمة الجانبية ========== */
.sidebar{
  width:230px;
  background:#cbced2;
  min-height:100vh;
  padding-top:20px;
}

.sidebar a{
  display:block;
  color:black;
  text-decoration:none;
  padding:12px 20px;
  margin:5px 10px;
  border-radius:8px;
}

.sidebar a:hover{
  background:#adadab;
}

/* ========== المحتوى الرئيسي ========== */
.main{
  flex:1;
  padding:25px;
}

/* ===== كارد المنتج ===== */
.product-card{
  max-width: 750px;
  margin: 0 auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* ===== صورة المنتج (حجم مناسب) ===== */
.product-img{
  width: 250px;      /* صغّرنا العرض */
  max-width: 100%;   /* حتى لا تخرج من الكارد */
  height: auto;      /* يحافظ على النسبة */
  border-radius: 12px;
  display:block;
  margin: 10px auto; /* توسيط الصورة */
}

input, textarea, button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.save-btn{
  background:#28a745;
  color:white;
  border:none;
  cursor:pointer;
}

.save-btn:hover{
  background:#218838;
}

/* ===== الفوتر ===== */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}
footer a {
  color: #ffd000;
  text-decoration: none;
  margin: 0 10px;
}
</style>
</head>

<body>

<!-- ========== HEADER ========== -->
<div class="navbar">
  <div class="right-side">
    <img id="storeImg" src="https://via.placeholder.com/45" class="store-img">
    <span id="welcomeText">مرحبًا، التاجر</span>
  </div>

  <div class="left-side">
    <div class="notification-wrapper">
      <a class="notifications" href="notifications.html">🔔</a>
      <span id="notifBadge" class="badge" style="display:none;">0</span>
    </div>
    <a class="logout" href="login.html">تسجيل الخروج</a>
    <div class="logo">Baro</div>
  </div>
</div>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <a href="dashboard.html">🏠 لوحة التحكم</a>
    <a href="allorders.html">🛒 الطلبات</a>
    <a href="settings.html">⚙️ الإعدادات</a>
    <a href="addProduct.html">➕ إضافة منتج</a>
  </div>

  <!-- ===== المحتوى الرئيسي ===== -->
  <div class="main">

    <div class="product-container">

  <!-- صورة المنتج -->
  <div class="product-header">
        <button id="editBtn" onclick="enableEdit()">✏️ تعديل المنتج</button>

    <img id="productImage" src="" class="product-img">
  </div>

  <!-- عرض المعلومات -->
  <div id="viewMode">
    <h2 id="v_name"></h2>
    <p><b>الصنف:</b> <span id="v_category"></span></p>
    <p><b>السعر:</b> <span id="v_price"></span> دج</p>
    <p><b>الوصف:</b></p>
    <p id="v_desc"></p>

    <h3>الميزات</h3>
    <div id="v_features"></div>
  </div>

  <!-- وضع التعديل (مخفي في البداية) -->
  <div id="editMode" style="display:none">

    <label>اسم المنتج</label>
    <input id="e_name">

    <label>الصنف</label>
    <input id="e_category">

    <label>السعر</label>
    <input id="e_price">

    <label>الوصف</label>
    <textarea id="e_desc"></textarea>

    <h3>الميزات</h3>
    <div id="e_features"></div>
<button type="button" onclick="addFeatureField()"
 style="background:#007bff;color:white;border:none;padding:8px;margin-top:6px; border-radius:6px;cursor:pointer;">
➕ إضافة ميزة جديدة
</button>
    <button onclick="saveChanges()" class="save-btn">💾 حفظ التغييرات</button>
  </div>

</div>

</div>
</div>
<footer>
  <p>© 2026 Baro - جميع الحقوق محفوظة</p>
</footer>

<script>
    const token = localStorage.getItem("token");
const merchantId = localStorage.getItem("merchantId");

// حماية الصفحة
if (!token || !merchantId) {
  alert("الرجاء تسجيل الدخول أولاً");
  window.location = "login.html";
}

// ===== جلب بيانات التاجر مثل باقي الصفحات =====
fetch(`https://order-platform-2.onrender.com/merchants/${merchantId}`, {
  headers: {
    "Authorization": `Bearer ${token}`,
    "Content-Type": "application/json"
  }
})
.then(res => res.json())
.then(merchant => {

  document.getElementById("welcomeText").textContent =
    "مرحبًا، " + (merchant.name || "التاجر");

  if (merchant.storeImage) {
    document.getElementById("storeImg").src =
      "https://order-platform-2.onrender.com" + merchant.storeImage;
  }
});

// استخراج productId من الرابط
const params = new URLSearchParams(window.location.search);
const productId = params.get("productId");

if(!productId){
  alert("لا يوجد معرف منتج!");
  window.location = "dashboard.html";
}
// تفعيل وضع التعديل
function enableEdit(){
  document.getElementById("viewMode").style.display = "none";
  document.getElementById("editMode").style.display = "block";
}
// إلغاء التعديل والعودة لوضع العرض
function disableEdit(){
  document.getElementById("viewMode").style.display = "block";
  document.getElementById("editMode").style.display = "none";
}
// جلب بيانات المنتج وعرضها
fetch(`https://order-platform-2.onrender.com/merchants/${merchantId}/products/${productId}`, {
  headers:{ Authorization: `Bearer ${token}` }
})
.then(r=>r.json())
.then(data=>{

  const p = data.product || data;

  // صورة
  document.getElementById("productImage").src =
     "https://order-platform-2.onrender.com"+(p.image||"");

  // وضع العرض
  document.getElementById("v_name").textContent = p.name;
  document.getElementById("v_category").textContent = p.category || "—";
  document.getElementById("v_price").textContent = p.price;
  document.getElementById("v_desc").textContent = p.description || "";
  document.getElementById("v_features").textContent = p.features ? JSON.stringify(p.features) : "";

  // وضع التعديل
  document.getElementById("e_name").value = p.name;
  document.getElementById("e_category").value = p.category || "";
  document.getElementById("e_price").value = p.price;
  document.getElementById("e_desc").value = p.description || "";
  document.getElementById("e_features").value = JSON.stringify(p.features || []);

  // الميزات (عرض)
  const vF = document.getElementById("v_features");
  vF.innerHTML="";

  (p.features||[]).forEach(f=>{
    vF.innerHTML += `<p><b>${f.name}:</b> ${f.values.join(" , ")}</p>`;
  });
// ملء الميزات في وضع التعديل
const eF = document.getElementById("e_features");
eF.innerHTML = "";

(p.features || []).forEach(f=>{
  addFeatureField(f.name, f.values.join(", "));
});

});
function addFeatureField(name = "", values = "") {
  const container = document.getElementById("e_features");

  const div = document.createElement("div");
  div.className = "feature-row";
  div.style.border = "1px solid #ddd";
  div.style.padding = "10px";
  div.style.marginTop = "8px";
  div.style.borderRadius = "8px";

  div.innerHTML = `
    <input placeholder="اسم الميزة (مثال: اللون)" value="${name}" class="f_name">
    <input placeholder="القيم مفصولة بفاصلة (أحمر, أزرق)" value="${values}" class="f_values">
    <button type="button" onclick="this.parentElement.remove()" 
      style="background:red;color:white;border:none;padding:6px;margin-top:5px;">
      🗑️ حذف
    </button>
  `;

  container.appendChild(div);
}

// حفظ التعديلات
function saveChanges(){

  const featureRows = document.querySelectorAll(".feature-row");
  let features = [];

  featureRows.forEach(row => {
    const name = row.querySelector(".f_name").value.trim();
    const values = row.querySelector(".f_values").value
                      .split(",")
                      .map(v => v.trim())
                      .filter(v => v !== "");

    if(name && values.length > 0){
      features.push({ name, values });
    }
  });

  const body = {
    name: document.getElementById("e_name").value,
    category: document.getElementById("e_category").value,
    price: document.getElementById("e_price").value,
    description: document.getElementById("e_desc").value,
    features: features
  };

  fetch(`https://order-platform-2.onrender.com/merchants/${merchantId}/products/${productId}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${token}`
    },
    body: JSON.stringify(body)
  })
  .then(r=>r.json())
  .then(()=>{
    alert("تم حفظ التعديلات ✅");
    location.reload();
  });
}

// ===== عدّاد الإشعارات =====
fetch(`https://order-platform-2.onrender.com/merchants/${merchantId}/notifications`)
.then(res => res.json())
.then(notifs => {
  const unread = notifs.filter(n => !n.isRead).length;
  const badge = document.getElementById("notifBadge");

  if(unread > 0){
    badge.style.display = "flex";
    badge.textContent = unread;
  } else {
    badge.style.display = "none";
  }
});

</script>

</body>
</html>
