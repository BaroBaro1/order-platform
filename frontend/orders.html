<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>طلبات المنتج</title>
  <style>
    body {
      background:#f4f4f9;
      font-family: Arial, sans-serif;
        margin:0;
      direction:rtl;
    }

/* ========== الهيدر (نفس الداشبورد) ========== */
.navbar {
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 30px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.right-side{
  display:flex;
  align-items:center;
  gap:10px;
}

.store-img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid #ddd;
}

#welcomeText{
  font-weight:bold;
  color:#333;
}

.left-side{
  display:flex;
  align-items:center;
  gap:15px;
}

.notifications{
  text-decoration:none;
  font-weight:bold;
  font-size:20px;
  cursor:pointer;
}

/* ===== عدّاد الإشعارات ===== */
.notification-wrapper{
  position: relative;
  display: inline-block;
}

.badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.logout{
  text-decoration:none;
  color:#ff3366;
  font-weight:bold;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#ff3366;
}

/* ========== تخطيط الصفحة ========== */
.layout{
  display:flex;
}

/* ========== القائمة الجانبية ========== */
.sidebar{
  width:230px;
  background:#cbced2;
  min-height:100vh;
  padding-top:20px;
}

.sidebar a{
  display:block;
  color:rgb(14, 12, 12);
  text-decoration:none;
  padding:12px 20px;
  margin:5px 10px;
  border-radius:8px;
}

.sidebar a:hover{
  background:#adadab;
}

/* ========== المحتوى الرئيسي ========== */
.main{
  flex:1;
  padding:25px;
}
 .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,.1);
 }

    h2 { text-align:center; margin-bottom:20px; }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:20px;
    }

    th, td {
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
    }

    th {
      background:#007bff;
      color:white;
    }

    .status {
      padding:5px 10px;
      border-radius:5px;
      color:white;
    }

    .pending { background:#ffc107; color:black; }
    .done { background:#28a745; }

    .back {
      display:inline-block;
      margin-bottom:15px;
      text-decoration:none;
      background:#333;
      color:white;
      padding:8px 12px;
      border-radius:5px;
    }

    #empty {
      text-align:center;
      margin-top:20px;
      color:#777;
    }
    .canceled {
  background: #dc3545;
}
/* ===== الفوتر ===== */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}

footer a {
  color: #ffd000;
  text-decoration: none;
  margin: 0 10px;
}
  </style>
</head>

<body>

<!-- ========== HEADER ========== -->
<div class="navbar">

  <div class="right-side">
    <img id="storeImg"
         src="https://via.placeholder.com/45"
         class="store-img">
    <span id="welcomeText">مرحبًا، التاجر</span>
  </div>

  <div class="left-side">
    <div class="notification-wrapper">
      <a class="notifications" href="notifications.html">🔔</a>
      <span id="notifBadge" class="badge" style="display:none;">0</span>
    </div>

    <a class="logout" href="login.html"> تسجيل الخروج</a>
    <div class="logo">Baro</div>
  </div>

</div>

<!-- ========== تخطيط الصفحة ========== -->
<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <a href="dashboard.html">🏠 لوحة التحكم</a>
    <a href="allorders.html">🛒 الطلبات</a>
    <a href="settings.html">⚙️ الإعدادات</a>
    <a href="addProduct.html" class="active">➕ إضافة منتج</a>
  </div>
   <!-- MAIN -->
  <div class="main">
  <!-- ===== المحتوى الرئيسي ===== -->
<div class="container">

  <a class="back" href="dashboard.html">⬅ العودة للوحة التاجر</a>

  <h2>📦 طلبات المنتج</h2>

  <table>
    <thead>
  <tr>
    <th>ID الطلب</th>
    <th>اسم الزبون</th>
    <th>الهاتف</th>
    <th>الولاية</th>
    <th>السعر الإجمالي</th>
    <th>الحالة</th>
    <th>الإجراءات</th>
  </tr>
</thead>

    <tbody id="ordersBody"></tbody>
  </table>

  <p id="empty"></p>
</div>
  </div></div>
<script>
const ordersBody = document.getElementById("ordersBody");
const emptyMsg = document.getElementById("empty");

// ===== قراءة البيانات المحفوظة =====
const merchantId = localStorage.getItem("merchantId");
const token = localStorage.getItem("token");

if (!merchantId || !token) {
  alert("الرجاء تسجيل الدخول أولاً");
  window.location = "login.html";
}

// ===== قراءة productId من الرابط =====
const params = new URLSearchParams(window.location.search);
const productId = params.get("productId");

if (!productId) {
  emptyMsg.textContent = "لم يتم تحديد المنتج!";
  throw new Error("Product ID missing");
}

// ===== جلب طلبات التاجر (مع التوكن) =====
fetch(`http://localhost:5500/merchants/${merchantId}/orders`, {
  headers: { "Authorization": `Bearer ${token}` }
})
.then(res => res.json())
.then(data => {

  const filteredOrders = data.filter(o => o.product.id == productId);

  if (filteredOrders.length === 0) {
    emptyMsg.textContent = "لا توجد طلبات لهذا المنتج حالياً";
    return;
  }

  filteredOrders.forEach(order => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${order.id}</td>
      <td>${order.customerName}</td>
      <td>${order.customerPhone}</td>
      <td>${order.wilaya}</td>
      <td>${order.totalPrice} دج</td>
      <td id="status-${order.id}" 
          class="status ${order.status}">
        ${order.status === "done" ? "مكتمل" :
          order.status === "canceled" ? "ملغى" : "معلّق"}
      </td>
      <td>
        <button onclick="updateStatus(${order.id}, 'done')">✅ تأكيد</button>
        <button onclick="updateStatus(${order.id}, 'canceled')">❌ إلغاء</button>
      </td>
    `;

    ordersBody.appendChild(tr);
  });
});

// ===== تحديث الحالة (يعمل مع server.js عندك) =====
function updateStatus(orderId, newStatus) {
  fetch(`http://localhost:5500/orders/${orderId}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: newStatus })
  })
  .then(res => res.json())
  .then(updated => {

    const cell = document.getElementById(`status-${orderId}`);

    if (newStatus === "done") {
      cell.textContent = "مكتمل";
      cell.className = "status done";
    } 
    else {
      cell.textContent = "ملغى";
      cell.className = "status canceled";
    }
  });
}
</script>
<footer>
  <p>
    <a href="#">من نحن</a> |
    <a href="#">اتصل بنا</a>
  </p>
  <p>© 2026 Baro - جميع الحقوق محفوظة</p>
</footer>
</body>
</html>
